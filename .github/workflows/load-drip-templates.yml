name: Load drip templates

# One-time (or whenever the drip copy changes): writes the 12 follow-up
# email templates into Firestore `marketingTemplates`. Manual trigger only.
# Run it from the Actions tab -> "Load drip templates" -> Run workflow.

on:
  workflow_dispatch:

jobs:
  load:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Load drip templates into Firestore
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_DATABASE_ID: ${{ secrets.FIREBASE_DATABASE_ID }}
        run: node scripts/drip-sequences/save-drip-templates.mjs
